# MusicBee DJ runtime configuration

musicbee:
  exe_path: "C:\\Program Files (x86)\\MusicBee\\MusicBee.exe"
  xml_path: "C:\\Users\\shich\\Music\\MusicBee\\iTunes Music Library.xml"

cache:
  db_path: "C:\\Users\\shich\\.gemini\\tmp\\musicbee_library_cache.json"

playlist:
  output_m3u: "C:\\Users\\shich\\.gemini\\tmp\\musicbee_jit_queue.m3u"
  max_tracks_per_session: 50
  curation:
    anchor_ratio: 0.6
    discovery_ratio: 0.3
    novelty_ratio: 0.1

energy_curves:
  high_intensity_min_bpm: 110
  low_intensity_max_bpm: 100

fallback:
  default_scene: "pop"
  aliases:
    study: "focus"
    reading: "focus"
    work: "focus"
    calm: "relax"
    sleep: "relax"
    meditation: "relax"
    housework: "energy"
    chores: "energy"
    workout: "energy"
    gym: "energy"
    daily: "pop"
    casual: "pop"

scenes:
  focus:
    genres: ["Classical", "pure music", "Jazz"]
  relax:
    genres: ["Jazz", "Country", "France", "pure music"]
  energy:
    genres: ["Rock", "Korean", "Jap", "eng"]
  coding:
    genres: ["pure music", "Classical", "Jap", "eng"]
  pop:
    genres: ["chs", "eng", "Jap", "Korean"]
