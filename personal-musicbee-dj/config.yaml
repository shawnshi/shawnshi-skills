# MusicBee DJ runtime configuration

musicbee:
  exe_path: "${MUSICBEE_EXE_PATH}"
  xml_path: "${MUSICBEE_XML_PATH}"

cache:
  db_path: "tmp/musicbee_library_cache.json"

playlist:
  output_m3u: "tmp/musicbee_jit_queue.m3u"
  max_tracks_per_session: 50
  curation:
    anchor_ratio: 0.6
    discovery_ratio: 0.3
    novelty_ratio: 0.1

energy_curves:
  high_intensity_min_bpm: 110
  low_intensity_max_bpm: 100

fallback:
  default_scene: "pop"
  aliases:
    study: "focus"
    reading: "focus"
    work: "focus"
    calm: "relax"
    sleep: "relax"
    meditation: "relax"
    housework: "energy"
    chores: "energy"
    workout: "energy"
    gym: "energy"
    daily: "pop"
    casual: "pop"

scenes:
  focus:
    genres: ["Classical", "pure music", "Jazz"]
  relax:
    genres: ["Jazz", "Country", "France", "pure music"]
  energy:
    genres: ["Rock", "Korean", "Jap", "eng"]
  coding:
    genres: ["pure music", "Classical", "Jap", "eng"]
  pop:
    genres: ["chs", "eng", "Jap", "Korean"]

filters:
  high_intensity_exclude: ["ambient", "chill", "intro", "氛围", "纯音乐"]
  low_intensity_exclude: ["metal", "rock", "edm", "金属", "摇滚", "电音"]
  intro_keywords: ["intro", "prelude", "序曲", "前奏"]
