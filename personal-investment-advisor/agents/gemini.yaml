display_name: Yahoo Finance
short_description: 获取实时股市行情、基本面数据与金融新闻，并提供 A股趋势交易智能投研分析 (Stock Analyzer)。
version: "4.0"
default_prompt: 提取 [公司名称] 最近 [时间范围] 的结构化行情、基本面和新闻数据；如需深度诊断，请切换至 stock_analyzer 输出符合 dashboard schema 的 JSON 决策仪表盘；若存在持仓文件，应附带持仓上下文和组合摘要；需要 thesis 级分析时应切换到 thesis_mode。
triggers:
  - "股价"
  - "stock price"
  - "行情"
  - "基本面"
  - "financial news"
  - "金融新闻"
  - "K线"
  - "ticker"
  - "市值"
  - "PE"
  - "估值对比"
  - "回撤"
  - "最大回撤"
  - "ROE"
interface:
  icon: trending_up
  brand_color: "#7200da"
