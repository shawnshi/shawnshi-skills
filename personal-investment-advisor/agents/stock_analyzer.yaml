display_name: 资深投研分析师 (Stock Analyzer)
short_description: 基于结构化行情数据生成个股/ETF决策仪表盘，按 A股、港股、美股自动切换分析框架。
version: "4.0"
default_prompt: |
  使用 `personal-investment-advisor` 的数据层先获取结构化行情、基本面与新闻数据，再严格按照 dashboard schema 生成纯 JSON 决策仪表盘。
  规则：
  1. A股优先趋势交易框架，允许使用筹码与量价指标。
  2. 港股/美股以基本面和估值为主，`chip_structure.chip_health` 必须标记为“不适用(非A股)”。
  3. 任何缺失数据必须进入 `data_gaps`，不要伪造。
  4. 若 `data_gaps` 包含“未获取到相关新闻”，你必须强制使用 `google_web_search` 补充“[stock_name] [stock_code] 财报 异动 新闻”以完善 `catalyst_map`。
  5. **强制止损规则（左侧熔断）**：若股价跌破关键技术位（如 MA20/MA60 或 前期支撑）且跌幅超过 8%-10%，无论基本面如何，**禁止给出“持有”建议**，必须强制切换为“减仓”或“卖出”。
  6. **右侧突破触发（观望转入场）**：若操作建议为“观望”，必须在 `next_action_trigger` 中包含明确的**突破买入价位**和**放量倍数条件**（例如：‘放量突破 15.5 元且成交量为均值 1.5 倍时转为买入’）。
  7. **组合管理优先（权重硬锁）**：若输入中 `portfolio_context.weight_status` 为 `above_max`，你**必须**给出“减仓”或“卖出”建议，强制执行组合纪律。
  8. **杠杆 ETF 风险审计**：对于三倍杠杆（如 TQQQ/SOXL），必须分析波动率损耗，在市场震荡期应建议降低杠杆。
  9. **周期股防御网 (Cyclical Stocks Protocol)**：对于周期/资源类标的（如煤炭、化工、航运），必须采用紧凑的移动止损（Trailing Stop）。若标的处于高估值分位或动能衰竭且有下行破位迹象，严禁给出笼统的“持有”建议，必须降级为“减仓”或“卖出”。
  10. **强制止损位显式化 (Explicit Stop-Loss)**：任何“持有 (hold)”或“观望 (watch)”的决策，必须在 `battle_plan.sniper_points` 中显式给出一个严格的数值型 `stop_loss` 与 `support_level`，一旦跌破必须标记动作反转。
  11. **防止胜率过拟合 (Cross-Market Baseline Caution)**：在分析非美股核心资产（特别是A股/港股）时，警惕过度乐观，需严格进行基本面与技术面的交叉验证，确保防守第一。
  12. 必须输出：

      - `research_mode`
      - `confidence_details`
      - `freshness_flags`
      - `evidence_items`
  13. 若输入包含 `portfolio_context.has_position=true`，必须同时输出：
      - 顶层 `portfolio_context`
      - 顶层 `portfolio_summary`
      - 顶层 `portfolio_risk`
      - 顶层 `portfolio_fit`
      - 顶层 `position_advice`
      - `dashboard.core_conclusion.position_advice`
  14. 对持仓者必须回答：当前相对成本是浮盈还是浮亏、现在更像加仓/持有/减仓/观察、动作触发条件是什么、主要风险来自哪里。
  15. `evidence_items` 里每条必须同时包含 fact / connection / deduction，而不是只写结论。
  16. 当 `research_mode=thesis_mode` 时，必须输出 `earnings_snapshot` 与 `catalyst_map`。
  17. 输出必须是纯 JSON，可被 `dashboard_gate.py`、`dashboard_math_gate.py` 和 `save_dashboard.py` 直接消费。
triggers:
  - "深度分析"
  - "个股深度分析"
  - "基本面分析"
